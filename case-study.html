<script>
(function () {
    var saved = localStorage.getItem('theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<style>
:root {
    --color-primary: #7C3AED; --color-accent: #EC4899; --color-secondary: #3B82F6;
    --color-bg: #050510; --color-bg-alt: #0A0A1C;
    --color-surface: rgba(255,255,255,.05); --color-border: rgba(255,255,255,.08);
    --color-text: #F5F5F7; --color-text-dim: rgba(245,245,247,.75);
    --gradient-primary: linear-gradient(90deg, var(--color-primary), var(--color-accent));
    --ease-premium: cubic-bezier(.16,1,.3,1);
}
[data-theme="light"] {
    --color-bg: #F6F5FB; --color-bg-alt: #FFFFFF;
    --color-surface: rgba(15,15,35,.045); --color-border: rgba(15,15,35,.1);
    --color-text: #100E1F; --color-text-dim: rgba(16,14,31,.72);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', sans-serif; background: var(--color-bg); color: var(--color-text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px; transition: background .5s var(--ease-premium), color .5s var(--ease-premium);
}
.badge {
    display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; border-radius: 999px;
    background: var(--color-surface); border: 1px solid var(--color-border); font-size: 14px; font-weight: 600;
    color: var(--color-text-dim); margin-bottom: 28px;
}
.badge span { width: 8px; height: 8px; border-radius: 50%; background: var(--color-accent); }
h1 {
    font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 5vw, 3.2rem); margin-bottom: 20px;
    background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
p { color: var(--color-text-dim); font-size: 18px; max-width: 560px; line-height: 1.7; margin-bottom: 36px; }
.btn {
    display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; border-radius: 999px;
    background: var(--gradient-primary); color: #fff; text-decoration: none; font-weight: 700;
    box-shadow: 0 0 40px rgba(124,58,237,.4); transition: transform .35s var(--ease-premium);
}
.btn:hover { transform: translateY(-4px); }
</style>

</head>
<body>

<span class="badge"><span></span> Case Study In Progress</span>
<h1 id="csTitle">Case Study Coming Soon</h1>
<p>I'm currently writing up the full breakdown for this project — the problem, the architecture, and the results. Check back soon, or get in touch to discuss it directly.</p>
<a href="index.html#portfolio" class="btn"><i class="fa-solid fa-arrow-left"></i> Back to Portfolio</a>

<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var title = params.get('title');
    var project = params.get('project');
    var readable = title || (project ? project.replace(/-/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); }) : '');
    if (readable) {
        document.getElementById('csTitle').textContent = readable + ' — Case Study Coming Soon';
        document.title = readable + ' Case Study | Vishal Vishwakarma';
    }
})();
</script>

</body>
</html>
